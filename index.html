<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍅 Pomodoro Timer</h1>
        <div class="modes">
            <button class="mode-btn active" data-mode="work">Work</button>
            <button class="mode-btn" data-mode="short">Short Break</button>
            <button class="mode-btn" data-mode="long">Long Break</button>
        </div>
        <div class="timer-display">
            <div class="timer-ring">
                <svg viewBox="0 0 200 200">
                    <circle class="ring-bg" cx="100" cy="100" r="90" />
                    <circle class="ring-progress" id="progressRing" cx="100" cy="100" r="90" />
                </svg>
                <div class="timer-text" id="timerText">25:00</div>
            </div>
        </div>
        <div class="controls">
            <button class="btn" id="startBtn">Start</button>
            <button class="btn" id="resetBtn">Reset</button>
        </div>
        <div class="stats">
            <div class="stat"><span class="stat-num" id="sessionsCount">0</span><span class="stat-label">Sessions</span></div>
            <div class="stat"><span class="stat-num" id="totalTime">0m</span><span class="stat-label">Total Focus</span></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
